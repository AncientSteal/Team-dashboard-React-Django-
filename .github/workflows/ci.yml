name: CI (Code Quality and Build)

on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd frontend
          npm install
      
      - name: Run Linter (ESLint)
        run: |
          cd frontend
          npm run lint
      
      - name: Run Frontend Tests (Vitest)
        run: |
          cd frontend
          npm run test:ci

  backend-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install dependencies
        run: |
            cd backend
            python -m pip install --upgrade pip
            pip install -r requirements.txt
      
      - name: Run Django Tests
        run: |
          cd backend
          python manage.py test